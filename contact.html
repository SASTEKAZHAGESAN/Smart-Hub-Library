<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- About Section -->
    <div class="container">
        <h2>Welcome to Our Library</h2>
        <p class="subtitle">
            Explore the beauty of knowledge with our rich library collection.
        </p>

        <div class="image-grid">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=700&q=80" alt="Library Image 1">
            </div>

            <div class="image-box wide">
                <img src="https://images.unsplash.com/photo-1496180727794-817822f65950?auto=format&fit=crop&w=700&q=80" alt="Library Image 2">
            </div>

            <div class="image-box wide">
                <img src="https://images.unsplash.com/photo-1511974035430-5de47d3b95da?auto=format&fit=crop&w=700&q=80" alt="Library Image 3">
            </div>
        </div>
    </div>

    <!-- Contact Section -->
    <div class="container">
        <h2>Contact Information</h2>

        <div class="contact-card">
            <h5>Name: <span>John Doe</span></h5>
            <p><strong>Address:</strong> 123 Main St, Springfield, USA</p>
            <p><strong>Company:</strong> Example Corp</p>
        </div>
    </div>

</body>
</html>
